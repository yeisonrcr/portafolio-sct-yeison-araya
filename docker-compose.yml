services:

  db:
    image: postgres:15-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_pass
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"      # 5434 local → 5432 contenedor (evita conflicto con otros proyectos)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: portfolio_web
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate --settings=config.settings.local &&
        python manage.py loaddata fixtures/initial_data.json --settings=config.settings.local &&
        python manage.py runserver 0.0.0.0:8001 --settings=config.settings.local
      "
    volumes:
      - .:/app
      - portfolio_media:/app/media
    ports:
      - "8001:8001"      # 8001 local → 8001 contenedor (evita conflicto con puerto 8000)
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: dev-secret-key-change-in-production-00000
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: portfolio
      DB_USER: portfolio_user
      DB_PASSWORD: portfolio_pass
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  portfolio_pgdata:
  portfolio_media:
